<html lang="ja">

<title>カウンセリング管理表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --s0-bg: #ffffff;  --s0-bd: #d1d5db;
  --s1-bg: #ffe4ec;  --s1-bd: #f472a0;  --s1-tx: #9b1a4a;
  --s2-bg: #fef9c3;  --s2-bd: #f59e0b;  --s2-tx: #78350f;
  --s3-bg: #e5e7eb;  --s3-bd: #9ca3af;  --s3-tx: #6b7280;
  --cw: 148px;
  --ch: 76px;
}

html, body {
  height: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  background: #0f172a;
  color: #111827;
  overflow: hidden;
}

body { display: flex; flex-direction: column; }

/* ─── TOPBAR ─── */
#topbar {
  flex-shrink: 0;
  height: 50px;
  background: #0f172a;
  border-bottom: 1px solid #1e3a5f;
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
}
#topbar h1 { color: #f1f5f9; font-size: .92rem; font-weight: 700; white-space: nowrap; }

.stats { display: flex; gap: 7px; }
.pill {
  padding: 3px 9px; border-radius: 20px;
  font-size: .7rem; font-weight: 700; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.pill b { font-size: .85rem; }
.p1 { background: #ffe4ec; color: #9b1a4a; }
.p2 { background: #fef9c3; color: #78350f; }
.p3 { background: #e5e7eb; color: #4b5563; }

#btnReset {
  margin-left: auto;
  background: #dc2626; color: #fff; border: none; border-radius: 8px;
  padding: 8px 13px; font-size: .78rem; font-weight: 700; font-family: inherit;
  cursor: pointer; touch-action: manipulation; white-space: nowrap;
}

/* ─── TABS ─── */
#tabs {
  flex-shrink: 0; height: 44px;
  display: flex; background: #0f172a;
  border-bottom: 2px solid #1e3a5f;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
#tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 0 22px; height: 100%;
  display: flex; align-items: center;
  color: #64748b; font-size: .85rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  touch-action: manipulation;
}
.tab.on { color: #38bdf8; border-bottom-color: #38bdf8; }

/* ─── LEGEND ─── */
#legend {
  flex-shrink: 0; height: 36px;
  background: #1e293b; border-bottom: 1px solid #334155;
  display: flex; align-items: center;
  padding: 0 14px; gap: 14px; overflow-x: auto;
}
#legend::-webkit-scrollbar { display: none; }
.leg { display: flex; align-items: center; gap: 5px; font-size: .68rem; color: #94a3b8; white-space: nowrap; }
.sw { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid; flex-shrink: 0; }
.sw0 { background: #fff; border-color: #d1d5db; }
.sw1 { background: #ffe4ec; border-color: #f472a0; }
.sw2 { background: #fef9c3; border-color: #f59e0b; }
.sw3 { background: #e5e7eb; border-color: #9ca3af; }
.leghint { margin-left: auto; font-size: .62rem; color: #475569; white-space: nowrap; }

/* ─── SCROLL ─── */
#scroller {
  flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; padding: 10px;
}

/* ─── SECTION ─── */
.sec { display: none; }
.sec.on { display: block; }

/* ─── TABLE ─── */
table.grid { border-collapse: separate; border-spacing: 4px; }

.th-corner { min-width: 52px; width: 52px; }

.th-time {
  min-width: var(--cw); width: var(--cw); height: 42px;
  background: #1e3a5f; color: #93c5fd;
  font-size: .68rem; font-weight: 700;
  text-align: center; vertical-align: middle;
  border-radius: 6px; white-space: nowrap; padding: 3px;
}

.th-row {
  min-width: 52px; width: 52px; height: var(--ch);
  background: #1e3a5f; color: #93c5fd;
  font-size: .75rem; font-weight: 700;
  text-align: center; vertical-align: middle;
  border-radius: 6px;
}

.td { min-width: var(--cw); width: var(--cw); height: var(--ch); vertical-align: top; padding: 0; }

/* ─── CARD ─── */
.card {
  width: 100%; height: 100%; min-height: var(--ch);
  border: 2px solid var(--s0-bd);
  border-radius: 8px; background: var(--s0-bg);
  display: flex; align-items: stretch; overflow: hidden;
  position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: border-color .15s, background .15s;
  user-select: none;
}
.card:active { transform: scale(.96); transition: transform .05s; }

.card.empty {
  border-style: dashed; border-color: #374151;
  background: rgba(255,255,255,.04);
  justify-content: center; align-items: center;
  color: #4b5563; font-size: 1.2rem;
}

.card[data-s="1"] { background: var(--s1-bg); border-color: var(--s1-bd); box-shadow: 0 0 0 2px rgba(244,114,160,.2); }
.card[data-s="2"] { background: var(--s2-bg); border-color: var(--s2-bd); animation: gp 1.8s ease-in-out infinite; }
.card[data-s="3"] { background: var(--s3-bg); border-color: var(--s3-bd); opacity: .65; }

@keyframes gp {
  0%,100% { box-shadow: 0 0 4px 2px rgba(245,158,11,.25); }
  50%      { box-shadow: 0 0 16px 5px rgba(245,158,11,.6); }
}

.c-num {
  display: flex; align-items: center; justify-content: center;
  width: 36px; min-width: 36px;
  background: rgba(0,0,0,.04); border-right: 1px solid rgba(0,0,0,.06);
  font-size: .78rem; font-weight: 700; color: #1d4ed8;
  text-align: center; word-break: break-all; padding: 2px; line-height: 1.2;
}
.card[data-s="1"] .c-num { color: var(--s1-tx); }
.card[data-s="2"] .c-num { color: var(--s2-tx); }
.card[data-s="3"] .c-num { color: var(--s3-tx); }

.c-body {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  padding: 5px 7px; gap: 3px; overflow: hidden; min-width: 0;
}
.c-name {
  font-size: .84rem; font-weight: 700; color: #111827;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.c-staff {
  font-size: .65rem; color: #6b7280;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card[data-s="1"] .c-name, .card[data-s="1"] .c-staff { color: var(--s1-tx); }
.card[data-s="2"] .c-name, .card[data-s="2"] .c-staff { color: var(--s2-tx); }
.card[data-s="3"] .c-name, .card[data-s="3"] .c-staff { color: var(--s3-tx); }

.c-dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; border-radius: 50%; display: none;
}
.card[data-s="1"] .c-dot { display: block; background: #f43f5e; }
.card[data-s="2"] .c-dot { display: block; background: #eab308; box-shadow: 0 0 4px #eab308; }
.card[data-s="3"] .c-dot { display: block; background: #9ca3af; }

/* ─── MODAL ─── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 999; justify-content: center; align-items: center; padding: 16px;
}
#overlay.on { display: flex; }
.modal {
  background: #fff; border-radius: 18px; padding: 22px;
  width: 100%; max-width: 360px;
  box-shadow: 0 30px 80px rgba(0,0,0,.5);
}
.modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: #111827; }
.mf { margin-bottom: 12px; }
.ml { font-size: .72rem; color: #6b7280; font-weight: 600; margin-bottom: 5px; display: block; }
.mi {
  width: 100%; padding: 13px 14px;
  border: 2px solid #e5e7eb; border-radius: 10px;
  font-family: inherit; font-size: 1rem; color: #111827; outline: none;
  -webkit-appearance: none;
}
.mi:focus { border-color: #3b82f6; }
.sbg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.sb {
  padding: 12px 6px; border: 2px solid #e5e7eb; border-radius: 9px;
  background: #f9fafb; font-family: inherit; font-size: .75rem; font-weight: 600;
  color: #6b7280; cursor: pointer; touch-action: manipulation; text-align: center;
}
.sb.on[data-s="0"] { border-color: #9ca3af; background: #f3f4f6; color: #374151; }
.sb.on[data-s="1"] { border-color: var(--s1-bd); background: var(--s1-bg); color: var(--s1-tx); }
.sb.on[data-s="2"] { border-color: var(--s2-bd); background: var(--s2-bg); color: var(--s2-tx); }
.sb.on[data-s="3"] { border-color: var(--s3-bd); background: var(--s3-bg); color: var(--s3-tx); }
.ma { display: flex; gap: 10px; margin-top: 18px; }
.mbtn {
  padding: 14px; border: none; border-radius: 10px;
  font-family: inherit; font-size: .9rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
}
.mbtn.cancel { background: #f1f5f9; color: #475569; flex: 0 0 80px; }
.mbtn.save   { background: #2563eb; color: #fff; flex: 1; }
</style>

//  STATE
// ============================================================
// id = "d{dateIdx}_r{rowIdx}_c{colIdx}"
const states = {};
const cardData = {};

function cid(d,r,c){ return `d${d}r${r}c${c}`; }

DATES.forEach((date, di) => {
  date.rows.forEach((row, ri) => {
    row.cells.forEach((cell, ci) => {
      const id = cid(di,ri,ci);
      states[id] = 0;
      cardData[id] = cell

        : { num: "", name: "", staff: "" };
    });
  });
});

// ============================================================
//  BUILD UI
// ============================================================
function slotEnd(slot) {
  const [h,m] = slot.split(':').map(Number);
  const t = h*60+m+15;
  return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
}

function buildAll() {
  const tabsEl = document.getElementById('tabs');
  const secsEl = document.getElementById('sections');

  DATES.forEach((date, di) => {
    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab' + (di===0?' on':'');
    tab.textContent = date.label;
    tab.onclick = () => switchDate(di);
    tabsEl.appendChild(tab);

    // Section
    const sec = document.createElement('div');
    sec.className = 'sec' + (di===0?' on':'');
    sec.id = `sec${di}`;

    const table = document.createElement('table');
    table.className = 'grid';

    // Header row

    const tr0 = document.createElement('tr');
    const corner = document.createElement('th');
    corner.className = 'th-corner';
    tr0.appendChild(corner);

    SLOTS.forEach(slot => {
      const th = document.createElement('th');
      th.className = 'th-time';
      th.innerHTML = `${slot}<br><span style="opacity:.6;font-weight:400">〜${slotEnd(slot)}</span>`;

    });
    thead.appendChild(tr0);
    table.appendChild(thead);

    // Body rows

    date.rows.forEach((row, ri) => {
      const tr = document.createElement('tr');

      // Row label (講師)
      const tdLabel = document.createElement('td');
      tdLabel.className = 'th-row';
      tdLabel.textContent = row.label;
      tr.appendChild(tdLabel);

      SLOTS.forEach((_, ci) => {
        const id = cid(di, ri, ci);
        const td = document.createElement('td');
        td.className = 'td';
        td.appendChild(makeCard(id));
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    sec.appendChild(table);
    secsEl.appendChild(sec);
  });

  updateStats();
}

function makeCard(id) {
  const d = cardData[id];
  const s = states[id];
  const empty = !d.name && !d.num;

  const card = document.createElement('div');
  card.className = 'card' + (empty ? ' empty' : '');
  card.dataset.s = s;
  card.dataset.id = id;

  if (empty) {
    card.textContent = '＋';
    // 空セルはタッチ・クリック両方でモーダルを開く（二重防止付き）
    let emptyLastTouch = 0;
    card.addEventListener('touchend', (e) => {
      e.preventDefault(); // clickの二重発火を防ぐ
      emptyLastTouch = Date.now();
      openModal(id);
    }, { passive: false });
    card.addEventListener('click', () => {
      if (Date.now() - emptyLastTouch > 500) openModal(id);
    });
    return card;
  }

  card.innerHTML = `
    <div class="c-num">${d.num}</div>
    <div class="c-body">
      <div class="c-name">${d.name}</div>
      <div class="c-staff">${d.staff}</div>
    </div>
    <div class="c-dot"></div>
  `;

  // ─── タッチ操作 ───
  // iPad では touchend → click の二重発火が起きるため、
  // タッチ系と mouse/click 系を完全に分離し、
  // touchend で e.preventDefault() して click を抑制する。
  let pressTimer = null;
  let longPressed = false;
  let touchMoved = false;
  let lastTouchEnd = 0;

  card.addEventListener('touchstart', (e) => {
    longPressed = false;
    touchMoved = false;
    pressTimer = setTimeout(() => {
      longPressed = true;
      openModal(id);
    }, 600);
  }, { passive: true });

  card.addEventListener('touchmove', () => {
    touchMoved = true;
    clearTimeout(pressTimer);
  }, { passive: true });

  card.addEventListener('touchcancel', () => {
    clearTimeout(pressTimer);
    longPressed = false;
  }, { passive: true });

  card.addEventListener('touchend', (e) => {
    e.preventDefault(); // ← これがキモ：click の二重発火を完全に防ぐ
    clearTimeout(pressTimer);
    lastTouchEnd = Date.now();
    if (!longPressed && !touchMoved) {
      advance(id); // タップ → 状態を1つ進める
    }
    longPressed = false;
    touchMoved = false;
  }, { passive: false }); // preventDefault を使うので passive:false

  // マウス用（PC）：タッチ操作後 500ms 以内は無視して二重実行を防ぐ
  card.addEventListener('mousedown', () => {
    if (Date.now() - lastTouchEnd < 500) return;
    longPressed = false;
    pressTimer = setTimeout(() => {
      longPressed = true;
      openModal(id);
    }, 600);
  });
  card.addEventListener('mouseup', () => { clearTimeout(pressTimer); });
  card.addEventListener('mouseleave', () => { clearTimeout(pressTimer); });
  card.addEventListener('click', () => {
    if (Date.now() - lastTouchEnd < 500) return; // タッチ後はスキップ
    if (!longPressed) advance(id);
  });

  return card;
}

function refreshCard(id) {
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (!el) return;
  el.parentNode.replaceChild(makeCard(id), el);
}

function advance(id) {
  states[id] = (states[id]+1)%4;
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (el) el.dataset.s = states[id];
  updateStats();
  // Firebase に即時書き込み → 他端末にリアルタイム反映
  update(dbRef, { [id]: states[id] });
}

function switchDate(di) {
  document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('on', i===di));
  document.querySelectorAll('.sec').forEach((s,i)=> s.classList.toggle('on', i===di));
}

function updateStats() {
  const ids = Object.keys(states);
  document.getElementById('s1').textContent = ids.filter(id=>states[id]===1).length;
  document.getElementById('s2').textContent = ids.filter(id=>states[id]===2).length;
  document.getElementById('s3').textContent = ids.filter(id=>states[id]===3).length;
}

function confirmReset() {
  if (!confirm('全カードの状態をリセットしますか？')) return;
  const allZero = {};
  Object.keys(states).forEach(id => { states[id]=0; allZero[id]=0; });
  document.querySelectorAll('.card').forEach(c => c.dataset.s=0);
  updateStats();
  // Firebase に一括書き込み
  set(dbRef, allZero);
}

// ─── MODAL ───
let editId=null, mState=0;

function openModal(id) {
  editId = id;
  const d = cardData[id];
  document.getElementById('mNum').value   = d.num;
  document.getElementById('mName').value  = d.name;
  document.getElementById('mStaff').value = d.staff;
  mState = states[id];
  refreshSBtns();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('mName').focus(), 80);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  editId = null;
}

function pickState(s) { mState=s; refreshSBtns(); }

function refreshSBtns() {
  document.querySelectorAll('.sb').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.s)===mState);
  });
}

function saveModal() {
  if (!editId) return;
  cardData[editId] = {
    num:   document.getElementById('mNum').value.trim(),
    name:  document.getElementById('mName').value.trim(),
    staff: document.getElementById('mStaff').value.trim(),
  };
  states[editId] = mState;
  refreshCard(editId);
  updateStats();
  // 状態 + カードデータ（氏名・番号・担当）を Firebase に書き込み → 全端末に同期
  update(dbRef,   { [editId]: states[editId] });
  update(cardRef, { [editId]: cardData[editId] });
  closeModal();
}


// ============================================================
//  モーダル・ボタンのイベント登録（type=module対応）
// ============================================================
function setupEvents() {
  // 戻るボタン
  document.querySelector('.mbtn.cancel').addEventListener('click', closeModal);
  document.querySelector('.mbtn.cancel').addEventListener('touchend', (e)=>{ e.preventDefault(); closeModal(); });

  // 保存ボタン
  document.querySelector('.mbtn.save').addEventListener('click', saveModal);
  document.querySelector('.mbtn.save').addEventListener('touchend', (e)=>{ e.preventDefault(); saveModal(); });

  // 状態選択ボタン
  document.querySelectorAll('.sb[data-pick]').forEach(btn => {
    const s = parseInt(btn.dataset.pick);
    btn.addEventListener('click', () => pickState(s));
    btn.addEventListener('touchend', (e)=>{ e.preventDefault(); pickState(s); });
  });

  // 全リセットボタン
  const resetBtn = document.getElementById('btnReset');
  if (resetBtn) {
    resetBtn.addEventListener('click', confirmReset);
    resetBtn.addEventListener('touchend', (e)=>{ e.preventDefault(); confirmReset(); });
  }

  // オーバーレイ外タップで閉じる
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  // キーボード
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}
// ============================================================
//  Firebase リアルタイム受信
//  他端末の変更を受け取り、自分の画面に反映する
// ============================================================
let fbInitialized = false;

// cardData（氏名・番号・担当）のリアルタイム同期
onValue(cardRef, (snapshot) => {
  const remoteCards = snapshot.val() || {};
  Object.keys(remoteCards).forEach(id => {
    if (cardData[id] !== undefined) {
      const prev = cardData[id];
      const next = remoteCards[id];
      // 変更があればカードを再描画
      if (prev.name !== next.name || prev.num !== next.num || prev.staff !== next.staff) {
        cardData[id] = next;
        if (fbInitialized) refreshCard(id);
      }
    }
  });
});

onValue(dbRef, (snapshot) => {
  const remote = snapshot.val() || {};

  // 初回ロード時：Firebaseの状態でローカルを上書き
  Object.keys(remote).forEach(id => {
    if (states[id] !== undefined) {
      states[id] = remote[id];
    }
  });

  // 初回のみ buildAll を呼び出す（以降は差分更新）
  if (!fbInitialized) {
    fbInitialized = true;
    buildAll();
    setupEvents();
    setConnected(true);
    return;
  }

  // 2回目以降：差分をカードに反映
  Object.keys(remote).forEach(id => {
    if (states[id] !== undefined) {
      const el = document.querySelector(`.card[data-id="${id}"]`);
      if (el && parseInt(el.dataset.s) !== remote[id]) {
        states[id] = remote[id];
        el.dataset.s = remote[id];
      }
    }
  });
  updateStats();
});

// 接続状態インジケーター
const connRef = ref(db, '.info/connected');
onValue(connRef, (snap) => { setConnected(snap.val() === true); });

function setConnected(ok) {
  const el = document.getElementById('connDot');
  if (!el) return;
  el.style.background = ok ? '#22c55e' : '#ef4444';
  el.title = ok ? '接続中' : '接続切断';
}

// Firebase 接続前のフォールバック（3秒後も未初期化なら通常起動）
setTimeout(() => {
  if (!fbInitialized) { fbInitialized = true; buildAll(); setupEvents(); }
}, 3000);
</script>
